services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  users-service:
    build: ./services/users-service
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: users_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: mySuperSecretKey123
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: myRefreshSecretKey456
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy

  products-service:
    build: ./services/products-service
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: production
      PORT: 4002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: products_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: mySuperSecretKey123
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  cart-service:
    build: ./services/cart-service
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: production
      PORT: 4003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cart_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: mySuperSecretKey123
    depends_on:
      postgres:
        condition: service_healthy

  orders-service:
    build: ./services/orders-service
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: production
      PORT: 4004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: orders_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: mySuperSecretKey123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
